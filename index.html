<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONTOP ONE DISCORD</title>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  font-family: 'Mali', sans-serif;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
}

/* 🎥 VIDEO BACKGROUND */
.video-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(1px) brightness(0.35);
  transform: scale(1.2);
  z-index: -3;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top, rgba(0,255,255,0.08), black 70%);
  z-index: -2;
}

/* ✨ PARTICLES */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.03);
}

.logo {
  font-weight: 800;
  letter-spacing: 2px;
  color: #00f7ff;
}

.btn {
  padding: 10px 18px;
  background: linear-gradient(90deg,#00f7ff,#7c3aed);
  border-radius: 10px;
  text-decoration: none;
  color: white;
}

/* HERO */
.hero {
  text-align: center;
  padding: 70px 20px 30px;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  opacity: 0.6;
}

/* TABS */
.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.tab {
  padding: 10px 15px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  transition: 0.3s;
}

.tab.active {
  background: rgba(0,247,255,0.2);
  border: 1px solid #00f7ff;
}

/* CARDS */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 20px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  border-color: #00f7ff;
}

.copy {
  margin-top: 10px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🎥 BACKGROUND VIDEO -->
<video autoplay muted loop class="video-bg">
  <source src="https://media.discordapp.net/attachments/1313086585109086218/1439756894448386048/ScreenRecording_11-17-2568_05-08-14_1.mov?ex=6a43a659&is=6a4254d9&hm=3584cf646309078d990fe9fb0df3af9e3524fcd7b8c3b95d1ce38436e1ef17f5&" type="video/mp4">
</video>

<div class="overlay"></div>

<canvas id="particles"></canvas>

<nav>
  <div class="logo">ยินดีต้อนรับ</div>
  <a class="btn" href="#servers">เข้าดิส</a>
</nav>

<div class="hero">
  <h1>รวมดิส 18+ ที่มาเเรง ณ ตอนนี้ !</h1>
  <p>18+ • Clup</p>
</div>
<div class="container" id="servers">

  <div class="card" data="0">
    <h3>ดิสเจ้าเซน</h3>
    <p>เน้นเเจกฟรี • สายโปรโมท • สายฟรี</p>
    <button class="copy" onclick="copy('https://discord.gg/xCyuUCrB9K')">ก็อบลิงก์</button>
  </div>

  <div class="card" data="1">
    <h3>ดิสเจ้าไนท์ V1</h3>
    <p>ของเเจก • โคตรเยอะ • คลิปเเรร์</p>
    <button class="copy" onclick="copy('https://discord.gg/CD5qGaDYV2')">ก็อบลิงก์</button>
  </div>

  <div class="card" data="2">
    <h3>ดิสเจ้าไนท์ V2</h3>
    <p>ลงคลิปเยอะมาก • Private • Premium</p>
    <button class="copy" onclick="copy('https://discord.gg/quQFYwwPH6')">ก็อบลิงก์</button>
  </div>

</div>

<script>
// COPY
function copy(text){
  navigator.clipboard.writeText(text);
  alert("ก็อบสําเร็จเเล้ว!");
}

// TAB FILTER
function show(i){
  let cards = document.querySelectorAll(".card");
  let tabs = document.querySelectorAll(".tab");

  tabs.forEach(t=>t.classList.remove("active"));
  tabs[i].classList.add("active");

  cards.forEach(c=>{
    c.style.display = (c.getAttribute("data")==i) ? "block" : "none";
  });
}

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    dx: Math.random()-0.5,
    dy: Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let p of particles){
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(0,247,255,0.5)";
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
  }

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
